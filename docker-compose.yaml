services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8790
      KIMI_API_KEY: ${KIMI_API_KEY}
      HOME: /tmp
      XDG_CONFIG_HOME: /home/claw/.config
      XDG_DATA_HOME: /tmp/.local/share
      XDG_STATE_HOME: /tmp/.local/state
    ports:
      - "8790:8790"
    networks:
      - clawnet
    volumes:
      - ./config/opencode.json:/home/claw/.config/opencode/opencode.json:ro
      - ./.env:/usr/src/app/.env:rw
      - ./AGENTS.md:/usr/src/app/AGENTS.md:ro
      # Avoid Docker daemon creating host paths as root; create them on host first.
      - type: bind
        source: ./projects
        target: /usr/src/app/projects
        bind:
          create_host_path: false
      - type: bind
        source: ./db
        target: /usr/src/app/db
        bind:
          create_host_path: false
      - type: bind
        source: ./.agents
        target: /usr/src/app/.agents
        bind:
          create_host_path: false
      - ./logs:/usr/src/app/logs:rw

  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    depends_on:
      - app
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./tailscale/state:/var/lib/tailscale
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_HOSTNAME: ${TS_HOSTNAME:-claw-empire-app}
      TS_STATE_DIR: ${TS_STATE_DIR:-/var/lib/tailscale}
      TS_EXTRA_ARGS: --hostname=${TS_HOSTNAME:-claw-empire-app}
    command: >
      sh -c "
        tailscaled --state=${TS_STATE_DIR:-/var/lib/tailscale}/tailscaled.state --socket=/var/run/tailscale/tailscaled.sock &
        until tailscale status >/dev/null 2>&1; do sleep 0.5; done
        tailscale up --authkey=${TS_AUTHKEY} ${TS_EXTRA_ARGS:-}
        tailscale serve reset || true
        tailscale serve --https=443 --set-path=/ --yes http://app:8790
        tailscale serve status
        tail -f /dev/null
      "
    networks:
      - clawnet

networks:
  clawnet:
    driver: bridge
