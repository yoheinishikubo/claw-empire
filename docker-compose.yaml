services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${APP_UID:-1000}
        GID: ${APP_GID:-1000}
    restart: unless-stopped
    user: "claw"
    env_file:
      - .env
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8790}
      HOME: /home/claw
      XDG_CONFIG_HOME: /home/claw/.config
      XDG_DATA_HOME: /home/claw/.local/share
      XDG_STATE_HOME: /home/claw/.local/state
    ports:
      - "${PORT:-8790}:${PORT:-8790}"
    networks:
      - clawnet
    volumes:
      - ./.env:/usr/src/app/.env:ro
      - ./AGENTS.md:/usr/src/app/AGENTS.md:ro
      # Avoid Docker daemon creating host paths as root; create them on host first.
      - type: bind
        source: ./claw
        target: /home/claw
        bind:
          create_host_path: false
      - type: bind
        source: ./projects
        target: /usr/src/app/projects
        bind:
          create_host_path: false
      - type: bind
        source: ./db
        target: /usr/src/app/db
        bind:
          create_host_path: false
      - ./logs:/usr/src/app/logs:rw

  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    depends_on:
      - app
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - type: bind
        source: ./tailscale/state
        target: /var/lib/tailscale
        bind:
          create_host_path: false
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?TS_AUTHKEY must be set in .env}
      TS_HOSTNAME: ${TS_HOSTNAME:-claw-empire-app}
      TS_STATE_DIR: ${TS_STATE_DIR:-/var/lib/tailscale}
      TS_EXTRA_ARGS: --hostname=${TS_HOSTNAME:-claw-empire-app} --accept-dns=false
    command: >
      sh -ec "
        tailscaled --state=$${TS_STATE_DIR:-/var/lib/tailscale}/tailscaled.state --socket=/var/run/tailscale/tailscaled.sock &
        # Wait for local tailscaled socket, then authenticate once.
        until [ -S /var/run/tailscale/tailscaled.sock ]; do sleep 0.5; done
        tailscale up --authkey=$${TS_AUTHKEY} $${TS_EXTRA_ARGS:-}
        tailscale serve reset || true
        tailscale serve --bg --https=443 --set-path=/ --yes http://app:$${PORT:-8790}
        tailscale serve status
        tail -f /dev/null
      "
    networks:
      - clawnet

networks:
  clawnet:
    driver: bridge
