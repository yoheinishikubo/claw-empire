upstream claw_empire {
    server 127.0.0.1:8790;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name claw.example.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name claw.example.com;

    # ssl_certificate     /etc/letsencrypt/live/claw.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/claw.example.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    client_max_body_size 50M;
    access_log /var/log/nginx/claw-empire.access.log;
    error_log  /var/log/nginx/claw-empire.error.log;

    location / {
        proxy_pass http://claw_empire;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /ws {
        proxy_pass http://claw_empire;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
